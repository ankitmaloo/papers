name: Add paper
description: Submit a paper and let Copilot summarize it, decide the topic fit, and update the right topic pages.
title: "[paper] "
body:
  - type: input
    id: paper_url
    attributes:
      label: Paper URL
      description: Submit a DOI page, arXiv page, publisher landing page, or direct PDF.
      placeholder: https://arxiv.org/abs/1706.03762
    validations:
      required: true
  - type: input
    id: title_override
    attributes:
      label: Title override
      description: Optional. Use this only when the submitted paper does not expose good metadata.
      placeholder: Attention Is All You Need
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Optional. Extra context for Copilot if there is something unusual about the paper.
      placeholder: PDF metadata is weak, but this paper seems unusually central to a new direction.
